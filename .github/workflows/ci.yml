name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports (basic sanity check)
        run: |
          python -c "import src.config; import src.main; import src.ingest; print('Imports OK')"

      - name: Run test suite
        env:
          # Dummy value so code paths that check for a key's presence behave
          # consistently; tests never make a real Gemini API call.
          GOOGLE_API_KEY: "test-placeholder-key"
        run: |
          pytest tests/test_basic.py -v
